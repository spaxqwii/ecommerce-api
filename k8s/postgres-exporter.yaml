apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-exporter
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-exporter
  template:
    metadata:
      labels:
        app: postgres-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      containers:
      - name: exporter
        image: prometheuscommunity/postgres-exporter:v0.15.0
        env:
        - name: DATA_SOURCE_NAME
          value: "postgresql://ecommerce:devops123@ecommerce-db-postgresql:5432/ecommerce?sslmode=disable"
        ports:
        - containerPort: 9187
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: ecommerce
spec:
  selector:
    app: postgres-exporter
  ports:
  - port: 9187
    targetPort: 9187