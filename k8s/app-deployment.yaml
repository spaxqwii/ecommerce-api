apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-api
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-api
  template:
    metadata:
      labels:
        app: ecommerce-api
    spec:
      containers:
      - name: ecommerce-api
        image: spaxqwii/ecommerce-api:v1.0.0
        imagePullPolicy: Always          # ✅ ADD - ensure fresh pulls
        # ❌ REMOVED: command and args - let image's CMD run
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "ecommerce-db-postgresql"  # ✅ CHANGED - direct value or fix secret
        - name: DB_PORT
          value: "5432"                     # ✅ ADD - missing
        - name: DB_NAME
          value: "ecommerce"                # ✅ ADD - missing
        - name: DB_USER
          value: "ecommerce"                # ✅ ADD - missing
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password                 # ✅ OK if secret has this key
        livenessProbe:                      # ✅ ADD - health checks
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:                     # ✅ ADD - health checks
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-api
  namespace: ecommerce
spec:
  selector:
    app: ecommerce-api
  ports:
  - port: 80          # ✅ CHANGED - standard HTTP port
    targetPort: 5000  # Container's port
  type: ClusterIP   # ✅ CHANGED - or NodePort if you need external access