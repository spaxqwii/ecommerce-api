apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: ecommerce
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: 'localhost:587'
      smtp_from: 'alerts@ecommerce.local'
    
    route:
      receiver: 'default'
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
    
    receivers:
    - name: 'default'
      slack_configs:
      - api_url: 'YOUR_SLACK_WEBHOOK_URL'
        channel: '#db-alerts'
        title: 'Database Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
      
      webhook_configs:
      - url: 'http://ecommerce-api:5000/webhooks/alerts'
        send_resolved: true